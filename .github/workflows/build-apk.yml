name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: android
          buildozer_version: stable

      - name: Upload APK to Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: perf-tool-apk
          path: ${{ steps.buildozer.outputs.filename }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "Perf Tool v1.0.0"
          body: |
            ## Perf Tool — Android APK

            Real-time performance overlay for gamers with **glassmorphism** UI.

            ### Features
            - ⚡ Real-time CPU & RAM monitoring
            - 🌐 Network speed (download/upload)
            - 🎨 iOS-style frosted glass design
            - 🪶 Lightweight, minimal battery impact

            ### Requirements
            - Android 8.0+ (API 26)
            - Enable "Install from unknown sources"

            ### Install
            1. Download the APK
            2. Transfer to your Android device
            3. Open and install
          files: ${{ steps.buildozer.outputs.filename }}
          draft: true
